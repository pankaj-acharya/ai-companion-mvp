name: Create issues from CSV

# Zero human intervention: committing/updating a CSV under issues/ triggers
# this workflow, which reads the CSV and creates the corresponding issues.
# workflow_dispatch is also provided for manual re-runs.
on:
  push:
    paths:
      - "issues/**.csv"
  workflow_dispatch:
    inputs:
      csv_path:
        description: "Path to the CSV file to process"
        required: false
        default: "issues/issues.csv"

permissions:
  contents: read
  issues: write

concurrency:
  group: create-issues-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Create issues from CSV
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CSV_PATH: ${{ github.event.inputs.csv_path || 'issues/issues.csv' }}
        run: python .github/scripts/create_issues.py
