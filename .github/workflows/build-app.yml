name: Build App

on:
  pull_request:
    branches:
      - main
    paths:
      - src/**
      - tests/**
      - AiCompanionMvp.sln
      - .github/workflows/build-app.yml
  push:
    branches:
      - main
    paths:
      - src/**
      - tests/**
      - AiCompanionMvp.sln
      - .github/workflows/build-app.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_test_publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore AiCompanionMvp.sln

      - name: Build
        run: dotnet build AiCompanionMvp.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test AiCompanionMvp.sln --configuration Release --no-build

      - name: Publish API
        run: dotnet publish src/AiCompanion.Api/AiCompanion.Api.csproj -c Release -o publish --no-build

      - name: Create package
        shell: bash
        run: |
          cd publish
          zip -r ../app.zip .

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-package
          path: app.zip
          retention-days: 7
