name: Terraform Validate and Plan

on:
  pull_request:
    branches:
      - main
    paths:
      - infrastructure/terraform/**
      - .github/workflows/terraform-validate-plan.yml

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  validate_plan:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infrastructure/terraform

    env:
      ARM_USE_OIDC: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Azure auth and subscription
        id: azure_target
        shell: bash
        run: |
          CLIENT_ID="${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}"
          TENANT_ID="${{ vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}"
          SUBSCRIPTION_ID="${{ vars.AZURE_SUBSCRIPTION_ID_DEV || secrets.AZURE_SUBSCRIPTION_ID }}"
          if [[ -z "$CLIENT_ID" || -z "$TENANT_ID" || -z "$SUBSCRIPTION_ID" ]]; then
            echo "Missing Azure auth config. Set secrets or variables for AZURE_CLIENT_ID, AZURE_TENANT_ID, and subscription id."
            exit 1
          fi
          echo "client_id=$CLIENT_ID" >> "$GITHUB_OUTPUT"
          echo "tenant_id=$TENANT_ID" >> "$GITHUB_OUTPUT"
          echo "subscription_id=$SUBSCRIPTION_ID" >> "$GITHUB_OUTPUT"

          echo "ARM_CLIENT_ID=$CLIENT_ID" >> "$GITHUB_ENV"
          echo "ARM_TENANT_ID=$TENANT_ID" >> "$GITHUB_ENV"
          echo "ARM_SUBSCRIPTION_ID=$SUBSCRIPTION_ID" >> "$GITHUB_ENV"

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ steps.azure_target.outputs.client_id }}
          tenant-id: ${{ steps.azure_target.outputs.tenant_id }}
          subscription-id: ${{ steps.azure_target.outputs.subscription_id }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TF_BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TF_BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TF_BACKEND_CONTAINER }}" \
            -backend-config="key=${{ vars.TF_BACKEND_STATE_KEY_DEV }}"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan (dev)
        run: terraform plan -input=false -no-color -var-file=terraform.tfvars.dev -out=tfplan

      - name: Export plan text
        run: terraform show -no-color tfplan > tfplan.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-dev
          path: infrastructure/terraform/tfplan.txt
